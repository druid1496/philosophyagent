<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Agora — Philosophy Debate Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════ RESET & BASE ═══════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080810;
      --bg-2:        #0d0d1c;
      --bg-card:     #111122;
      --bg-hover:    #181830;
      --gold:        #c8921a;
      --gold-bright: #f0b930;
      --gold-glow:   rgba(200, 146, 26, 0.35);
      --gold-dim:    rgba(200, 146, 26, 0.12);
      --text:        #e2d8c8;
      --text-dim:    #6870a0;
      --text-muted:  #3a3a60;
      --border:      #1e1e36;
      --border-mid:  #2a2a48;
      --radius:      10px;

      /* Philosopher palette */
      --plato:       #5b8dd9;
      --aristotle:   #4ca870;
      --kant:        #c49a3c;
      --mill:        #d47a50;
      --nietzsche:   #c04444;
      --machiavelli: #7a8a9a;
      --moderator:   #c8921a;
      --director:    #8855cc;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════ SCROLLBAR ═══════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

    /* ═══════════════════════════ BACKGROUND ═══════════════════════════ */
    #bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════ LAYOUT ═══════════════════════════ */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    /* ═══════════════════════════ SETUP SCREEN ═══════════════════════════ */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      margin-bottom: 56px;
    }

    .hero-ornament {
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 18px;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      line-height: 1;
      background: linear-gradient(135deg, #f0c060 0%, #c8921a 40%, #f0c060 70%, #a07010 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      text-shadow: none;
      filter: drop-shadow(0 0 40px rgba(200, 146, 26, 0.4));
    }

    .hero-subtitle {
      font-family: 'EB Garamond', serif;
      font-size: 1.35rem;
      font-style: italic;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .hero-divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 28px auto 0;
    }

    /* ── Setup Card ── */
    .setup-card {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 860px;
      box-shadow: 0 0 80px rgba(0,0,0,0.6), 0 0 1px var(--border-mid);
    }

    .setup-section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    /* Topic */
    .topic-area {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 1.25rem;
      line-height: 1.6;
      padding: 18px 22px;
      resize: none;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
      min-height: 90px;
    }

    .topic-area::placeholder { color: var(--text-muted); font-style: italic; }
    .topic-area:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-dim);
    }

    /* Philosopher Grid */
    .phil-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 4px;
    }

    .phil-card {
      position: relative;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s ease;
      user-select: none;
    }

    .phil-card:hover { border-color: var(--border-mid); background: var(--bg-hover); }

    .phil-card.selected {
      border-color: var(--color, var(--gold));
      background: color-mix(in srgb, var(--color, var(--gold)) 8%, var(--bg));
      box-shadow: 0 0 20px color-mix(in srgb, var(--color, var(--gold)) 20%, transparent);
    }

    .phil-card .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color, #888) 20%, var(--bg));
      border: 2px solid color-mix(in srgb, var(--color, #888) 50%, transparent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color, #888);
      transition: all 0.25s;
    }

    .phil-card.selected .avatar {
      background: color-mix(in srgb, var(--color, #888) 25%, var(--bg));
      box-shadow: 0 0 14px color-mix(in srgb, var(--color, #888) 40%, transparent);
    }

    .phil-card .phil-name {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      margin-bottom: 3px;
    }

    .phil-card .phil-era {
      font-size: 0.65rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .phil-card .check {
      position: absolute;
      top: 8px; right: 10px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--color, var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      color: #000;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .phil-card.selected .check { opacity: 1; }

    /* Sliders */
    .sliders-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .slider-group label .slider-val {
      font-weight: 600;
      color: var(--gold);
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border-mid);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 8px var(--gold-glow);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* Divider inside card */
    .setup-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0;
    }

    /* Start button */
    .start-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #b07a10, #d4a020, #b07a10);
      background-size: 200% 100%;
      border: none;
      border-radius: var(--radius);
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #0a0800;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .start-btn:hover {
      background-position: right center;
      box-shadow: 0 0 40px var(--gold-glow), 0 4px 20px rgba(0,0,0,0.5);
      transform: translateY(-1px);
    }

    .start-btn:active { transform: translateY(0); }

    .start-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .start-btn:hover::after { transform: translateX(100%); }

    /* Past debates */
    .past-section {
      width: 100%;
      max-width: 860px;
      margin-top: 40px;
    }

    .past-title {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 16px;
      text-align: center;
    }

    .past-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    .past-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .past-card:hover {
      border-color: var(--gold);
      background: var(--bg-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .past-card .past-topic {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .past-card .past-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    .past-card .past-phils {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 6px;
    }


    /* ═══════════════════════════ DEBATE SCREEN ═══════════════════════════ */
    #debate-screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }

    #debate-screen.active { display: flex; }

    /* ── Debate Header ── */
    .debate-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(8, 8, 16, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
    }

    .debate-header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .back-btn {
      background: none;
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      color: var(--text-dim);
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
    }

    .back-btn:hover { border-color: var(--gold); color: var(--gold); }

    .debate-header-topic {
      flex: 1;
      font-family: 'EB Garamond', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.3;
    }

    .debate-status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .status-dot.live {
      background: #4caf50;
      box-shadow: 0 0 8px rgba(76, 175, 80, 0.6);
      animation: pulse-dot 1.5s infinite;
    }

    .status-dot.done { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow); }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Philosopher Stage ── */
    .philosopher-stage {
      background: linear-gradient(180deg, rgba(13,13,28,0.9) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
    }

    .philosopher-stage-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stage-philosopher {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      transition: all 0.35s ease;
      min-width: 100px;
      cursor: default;
    }

    .stage-philosopher .stage-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color, #888) 15%, var(--bg));
      border: 2px solid color-mix(in srgb, var(--color, #888) 40%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--color, #888);
      transition: all 0.35s ease;
    }

    .stage-philosopher .stage-name {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      transition: color 0.3s;
    }

    .stage-philosopher.speaking {
      border-color: var(--color, var(--gold));
      background: color-mix(in srgb, var(--color, var(--gold)) 10%, var(--bg-card));
      box-shadow: 0 0 30px color-mix(in srgb, var(--color, var(--gold)) 25%, transparent);
      transform: translateY(-4px) scale(1.04);
    }

    .stage-philosopher.speaking .stage-avatar {
      border-color: var(--color, var(--gold));
      box-shadow: 0 0 20px color-mix(in srgb, var(--color, var(--gold)) 50%, transparent);
      animation: avatar-glow 1.5s ease-in-out infinite;
    }

    .stage-philosopher.speaking .stage-name { color: var(--color, var(--gold)); }

    @keyframes avatar-glow {
      0%, 100% { box-shadow: 0 0 20px color-mix(in srgb, var(--color, gold) 50%, transparent); }
      50% { box-shadow: 0 0 35px color-mix(in srgb, var(--color, gold) 80%, transparent); }
    }

    /* ── Main arena ── */
    .arena-body {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 32px 32px 120px;
    }

    /* Loading/status area */
    .status-overlay {
      text-align: center;
      padding: 40px 20px;
      font-family: 'EB Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--text-dim);
    }

    .status-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border-mid);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════ MESSAGE CARDS ═══════════════════════════ */
    .message-card {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease, transform 0.5s ease;
      margin-bottom: 28px;
    }

    .message-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Moderator ── */
    .message-card.moderator {
      text-align: center;
      padding: 32px 40px;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--gold) 5%, var(--bg-card)) 0%,
        var(--bg-card) 100%);
      border: 1px solid color-mix(in srgb, var(--gold) 35%, transparent);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .message-card.moderator::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .moderator-crown {
      font-size: 1.4rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 8px var(--gold-glow));
    }

    .moderator-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    .moderator-ornament {
      font-size: 0.8rem;
      color: var(--gold);
      opacity: 0.5;
      letter-spacing: 0.4em;
      margin: 14px 0;
    }

    .message-card.moderator .message-content {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.85;
      color: var(--text);
      font-style: italic;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── Philosopher ── */
    .message-card.philosopher {
      border: 1px solid var(--border);
      border-left: 3px solid var(--color, #888);
      border-radius: 0 12px 12px 0;
      background: var(--bg-card);
      overflow: hidden;
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s;
    }

    .message-card.philosopher:hover {
      border-color: color-mix(in srgb, var(--color, #888) 50%, var(--border));
      box-shadow: 0 4px 30px rgba(0,0,0,0.4);
    }

    .philosopher-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 22px;
      background: color-mix(in srgb, var(--color, #888) 6%, var(--bg-card));
      border-bottom: 1px solid var(--border);
    }

    .philosopher-header .msg-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--color, #888) 20%, var(--bg));
      border: 2px solid color-mix(in srgb, var(--color, #888) 60%, transparent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color, #888);
      flex-shrink: 0;
    }

    .philosopher-header .speaker-info { flex: 1; }

    .philosopher-header .speaker-name {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color, #888);
      letter-spacing: 0.05em;
    }

    .philosopher-header .speaker-era {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .turn-badge {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .message-card.philosopher .message-content {
      font-family: 'EB Garamond', serif;
      font-size: 1.15rem;
      line-height: 1.9;
      color: var(--text);
      padding: 22px 24px;
    }

    /* Inline quote styling */
    .message-content em {
      font-style: italic;
      color: color-mix(in srgb, var(--color, var(--gold)) 80%, var(--text));
    }

    /* ── Director ── */
    .message-card.director {
      border: 1px dashed var(--border-mid);
      border-radius: var(--radius);
      padding: 16px 22px;
      background: rgba(136, 85, 204, 0.04);
    }

    .director-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--director);
      margin-bottom: 10px;
      opacity: 0.8;
    }

    .message-card.director .message-content {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Evaluator (legacy) ── */
    .message-card.evaluator {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      background: var(--bg-card);
      opacity: 0.6;
    }

    .evaluator-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .message-card.evaluator .message-content {
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.6;
    }

    /* ── Debate Complete ── */
    .debate-complete {
      text-align: center;
      padding: 48px 24px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .complete-ornament {
      font-size: 2.5rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 20px var(--gold-glow));
    }

    .complete-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .complete-subtitle {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: var(--text-dim);
    }

    .complete-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: none;
      border: 1px solid var(--gold);
      border-radius: 8px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: all 0.2s;
    }

    .complete-btn:hover {
      background: var(--gold-dim);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    /* ═══════════════════════════ NOTIFICATIONS ═══════════════════════════ */
    #notif-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .notif {
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: var(--text);
      max-width: 320px;
      animation: notif-in 0.35s ease both;
      pointer-events: auto;
    }

    .notif.error { border-color: #c04444; color: #e07070; }
    .notif.success { border-color: var(--gold); color: var(--gold-bright); }

    @keyframes notif-in {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ═══════════════════════════ UTILITIES ═══════════════════════════ */
    .section-gap { margin-bottom: 28px; }

    .flex-col { display: flex; flex-direction: column; gap: 12px; }

    @media (max-width: 600px) {
      .setup-card { padding: 28px 22px; }
      .sliders-row { grid-template-columns: 1fr; }
      .arena-body { padding: 20px 16px 80px; }
      .debate-header { padding: 12px 16px; }
      .philosopher-stage { padding: 14px 16px; }
    }
  </style>
</head>
<body>

<!-- ── Particle background ── -->
<canvas id="bg-canvas"></canvas>

<div id="app">

  <!-- ════════════════════════ SETUP SCREEN ════════════════════════ -->
  <div id="setup-screen">

    <div class="hero">
      <div class="hero-ornament">✦ &nbsp; Philosophical Arena &nbsp; ✦</div>
      <h1 class="hero-title">The Agora</h1>
      <p class="hero-subtitle">Where great minds collide across the ages</p>
      <div class="hero-divider"></div>
    </div>

    <div class="setup-card">

      <!-- Topic -->
      <div class="section-gap">
        <div class="setup-section-label">Debate Topic</div>
        <textarea
          id="topic-input"
          class="topic-area"
          rows="2"
          placeholder="e.g. Is artificial intelligence a threat to human flourishing and dignity?"
        ></textarea>
      </div>

      <hr class="setup-divider" />

      <!-- Philosopher selection -->
      <div class="section-gap">
        <div class="setup-section-label">Summon the Philosophers</div>
        <div id="phil-grid" class="phil-grid">
          <!-- filled by JS -->
        </div>
      </div>

      <hr class="setup-divider" />

      <!-- Sliders -->
      <div class="section-gap sliders-row">
        <div class="slider-group">
          <label>
            Philosopher Speeches
            <span class="slider-val" id="turns-val">6</span>
          </label>
          <input type="range" id="turns-slider" min="3" max="16" value="6"
            oninput="document.getElementById('turns-val').textContent = this.value" />
        </div>
        <div class="slider-group">
          <label>
            Moderator Every
            <span class="slider-val" id="mod-val">4</span>
          </label>
          <input type="range" id="mod-slider" min="0" max="8" value="4"
            oninput="document.getElementById('mod-val').textContent = this.value == 0 ? 'Off' : this.value" />
        </div>
      </div>

      <button class="start-btn" onclick="startDebate()">
        ✦ &nbsp; Convene the Agora &nbsp; ✦
      </button>

    </div><!-- /setup-card -->

    <!-- Past debates -->
    <div class="past-section" id="past-section" style="display:none">
      <div class="past-title">⟡ &nbsp; Past Debates &nbsp; ⟡</div>
      <div id="past-grid" class="past-grid"></div>
    </div>

  </div><!-- /setup-screen -->


  <!-- ════════════════════════ DEBATE SCREEN ════════════════════════ -->
  <div id="debate-screen">

    <!-- Sticky header -->
    <div class="debate-header">
      <div class="debate-header-inner">
        <button class="back-btn" onclick="returnToSetup()">← Back</button>
        <div class="debate-header-topic" id="header-topic"></div>
        <div class="debate-status-badge">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">Starting…</span>
        </div>
      </div>
    </div>

    <!-- Philosopher portraits stage -->
    <div class="philosopher-stage">
      <div class="philosopher-stage-inner" id="phil-stage"></div>
    </div>

    <!-- Message feed -->
    <div class="arena-body">
      <div id="status-overlay" class="status-overlay">
        <div class="status-spinner"></div>
        <span id="status-overlay-text">Gathering the philosophers…</span>
      </div>
      <div id="message-feed"></div>
    </div>

  </div><!-- /debate-screen -->

</div><!-- /app -->

<!-- Notifications -->
<div id="notif-container"></div>


<script>
/* ═══════════════════════════════════════════════════════════
   PHILOSOPHER METADATA
═══════════════════════════════════════════════════════════ */
const PHIL_COLORS = {
  Plato:       '#5b8dd9',
  Aristotle:   '#4ca870',
  Kant:        '#c49a3c',
  Mill:        '#d47a50',
  Nietzsche:   '#c04040',
  Machiavelli: '#7a8a9a',
};

const PHIL_INITIALS = {
  Plato:       'Pl',
  Aristotle:   'Ar',
  Kant:        'Ka',
  Mill:        'Mi',
  Nietzsche:   'Ni',
  Machiavelli: 'Mc',
};

const SAMPLE_TOPICS = [
  'Is artificial intelligence a threat to human flourishing and dignity?',
  'Can democracy survive in the age of social media?',
  'Is the pursuit of happiness the highest human good?',
  'Does morality require God, or can it exist without religion?',
  'Is free will an illusion, and does it matter?',
  'What obligations do the living owe to future generations?',
];

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let philosopherData = {};
let msgQueue = [];
let isTyping = false;
let debateComplete = false;
let currentConfig = null;

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
async function init() {
  // Rotating placeholder + Tab-to-accept
  const ta = document.getElementById('topic-input');
  let topicIdx = 0;
  ta.placeholder = SAMPLE_TOPICS[topicIdx];
  setInterval(() => {
    topicIdx = (topicIdx + 1) % SAMPLE_TOPICS.length;
    ta.placeholder = SAMPLE_TOPICS[topicIdx];
  }, 4000);

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && ta.value.trim() === '') {
      e.preventDefault();
      ta.value = SAMPLE_TOPICS[topicIdx];
      ta.setSelectionRange(ta.value.length, ta.value.length);
    }
  });

  // Fetch philosopher list
  try {
    const res = await fetch('/philosophers');
    const phils = await res.json();
    philosopherData = {};
    for (const p of phils) philosopherData[p.name] = p;
    renderPhilGrid(phils);
  } catch (e) {
    showNotif('Could not reach server. Is it running?', 'error');
  }

  // Fetch past debates
  try {
    const debates = await fetch('/debates').then(r => r.json());
    if (debates.length > 0) renderPastDebates(debates);
  } catch {}
}

/* ═══════════════════════════════════════════════════════════
   PHILOSOPHER GRID
═══════════════════════════════════════════════════════════ */
function renderPhilGrid(phils) {
  const grid = document.getElementById('phil-grid');
  grid.innerHTML = '';
  for (const p of phils) {
    const color = PHIL_COLORS[p.name] || '#888';
    const initials = PHIL_INITIALS[p.name] || p.name[0];
    const card = document.createElement('div');
    card.className = 'phil-card selected';
    card.dataset.name = p.name;
    card.style.setProperty('--color', color);
    card.title = p.description || '';
    card.innerHTML = `
      <div class="check">✓</div>
      <div class="avatar">${initials}</div>
      <div class="phil-name">${p.name}</div>
      <div class="phil-era">${p.era}</div>
    `;
    card.addEventListener('click', () => togglePhil(card));
    grid.appendChild(card);
  }
}

function togglePhil(card) {
  const selected = document.querySelectorAll('.phil-card.selected');
  if (card.classList.contains('selected') && selected.length <= 2) {
    showNotif('You need at least 2 philosophers.', 'error');
    return;
  }
  card.classList.toggle('selected');
}

/* ═══════════════════════════════════════════════════════════
   PAST DEBATES
═══════════════════════════════════════════════════════════ */
function renderPastDebates(debates) {
  const section = document.getElementById('past-section');
  const grid = document.getElementById('past-grid');
  section.style.display = 'block';
  grid.innerHTML = '';
  for (const d of debates.slice(0, 8)) {
    const card = document.createElement('div');
    card.className = 'past-card';
    const date = d.modified ? new Date(d.modified * 1000).toLocaleDateString() : '';
    card.innerHTML = `
      <div class="past-topic">${d.topic}</div>
      <div class="past-phils">${(d.philosophers || []).join(' · ')}</div>
      <div class="past-meta">
        <span>${d.message_count} exchanges</span>
        <span>${date}</span>
      </div>
    `;
    card.addEventListener('click', () => loadPastDebate(d.filename));
    grid.appendChild(card);
  }
}

async function loadPastDebate(filename) {
  try {
    const data = await fetch(`/debates/${filename}`).then(r => r.json());
    const philosophers = data.philosophers || [];
    const topic = data.topic || 'Unknown';
    const msgs = (data.messages || []).filter(m => m.speaker_type !== 'evaluator');

    currentConfig = { topic, philosophers, turns: data.turns || 6, moderator_every: 4 };
    showDebateScreen(topic, philosophers);

    // Hide spinner immediately
    hideStatusOverlay();

    // Queue all messages for animated replay
    setStatusLive(false);
    setStatusText('Replaying debate…');

    for (const msg of msgs) {
      msgQueue.push(msg);
    }
    if (!isTyping) drainQueue();

    // Mark done after drain
    const checkDone = setInterval(() => {
      if (msgQueue.length === 0 && !isTyping) {
        clearInterval(checkDone);
        onDebateComplete();
      }
    }, 500);

  } catch (e) {
    showNotif('Failed to load debate: ' + e.message, 'error');
  }
}

/* ═══════════════════════════════════════════════════════════
   START NEW DEBATE
═══════════════════════════════════════════════════════════ */
async function startDebate() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) {
    showNotif('Please enter a topic.', 'error'); return;
  }

  const selected = [...document.querySelectorAll('.phil-card.selected')]
    .map(c => c.dataset.name);
  if (selected.length < 2) {
    showNotif('Select at least 2 philosophers.', 'error'); return;
  }

  const turns = parseInt(document.getElementById('turns-slider').value);
  const modEvery = parseInt(document.getElementById('mod-slider').value);

  currentConfig = { topic, philosophers: selected, turns, moderator_every: modEvery };
  showDebateScreen(topic, selected);

  setStatusLive(true);
  setStatusText('Starting…');

  try {
    const response = await fetch('/debate/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(currentConfig),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const ev = JSON.parse(line.slice(6));
            handleEvent(ev);
          } catch {}
        }
      }
    }
  } catch (e) {
    showNotif('Connection error: ' + e.message, 'error');
    setStatusLive(false);
    setStatusText('Disconnected');
  }
}

/* ═══════════════════════════════════════════════════════════
   EVENT HANDLER
═══════════════════════════════════════════════════════════ */
function handleEvent(ev) {
  if (ev.type === 'status') {
    updateStatusOverlay(ev.content);
    setStatusText(ev.content);
  } else if (ev.type === 'debate_started') {
    hideStatusOverlay();
    setStatusText('In progress…');
  } else if (ev.type === 'message') {
    msgQueue.push(ev.data);
    if (!isTyping) drainQueue();
  } else if (ev.type === 'done') {
    // Wait for queue to drain, then mark complete
    const check = setInterval(() => {
      if (msgQueue.length === 0 && !isTyping) {
        clearInterval(check);
        onDebateComplete();
      }
    }, 300);
  } else if (ev.type === 'error') {
    hideStatusOverlay();
    setStatusLive(false);
    setStatusText('Error');
    showNotif('⚠ ' + ev.content, 'error');
  }
}

/* ═══════════════════════════════════════════════════════════
   MESSAGE QUEUE / RENDERING
═══════════════════════════════════════════════════════════ */
async function drainQueue() {
  if (msgQueue.length === 0) { isTyping = false; return; }
  isTyping = true;
  const msg = msgQueue.shift();
  await renderMessage(msg);
  await sleep(200);
  drainQueue();
}

async function renderMessage(msg) {
  const feed = document.getElementById('message-feed');
  const el = buildMessageEl(msg);
  feed.appendChild(el);

  // Trigger entrance animation on next frame
  await sleep(20);
  el.classList.add('visible');

  // Highlight the stage portrait
  highlightSpeaker(msg.speaker_name);

  // Typewriter the content
  const contentEl = el.querySelector('.message-content');
  if (contentEl) {
    await typewrite(contentEl, msg.content);
    el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }
}

function buildMessageEl(msg) {
  const el = document.createElement('div');
  const type = msg.speaker_type;
  const color = PHIL_COLORS[msg.speaker_name] || '#888';
  const initials = PHIL_INITIALS[msg.speaker_name] || (msg.speaker_name || '?')[0];

  if (type === 'moderator') {
    el.className = 'message-card moderator';
    const isCheckpoint = msg.content && msg.content.startsWith('—');
    el.innerHTML = `
      <div class="moderator-crown">⚖</div>
      <div class="moderator-label">${isCheckpoint ? 'Moderator — Checkpoint' : 'Moderator'}</div>
      <div class="moderator-ornament">✦ · ✦ · ✦</div>
      <div class="message-content"></div>
      <div class="moderator-ornament">✦ · ✦ · ✦</div>
    `;
  } else if (type === 'philosopher') {
    el.className = 'message-card philosopher';
    el.style.setProperty('--color', color);
    const era = philosopherData[msg.speaker_name]?.era || '';
    el.innerHTML = `
      <div class="philosopher-header">
        <div class="msg-avatar" style="color:${color};border-color:${color}40;background:${color}18">${initials}</div>
        <div class="speaker-info">
          <div class="speaker-name" style="color:${color}">${msg.speaker_name}</div>
          <div class="speaker-era">${era}</div>
        </div>
        <div class="turn-badge">Turn ${(msg.turn || 0) + 1}</div>
      </div>
      <div class="message-content"></div>
    `;
  } else if (type === 'director') {
    el.className = 'message-card director';
    el.innerHTML = `
      <div class="director-label">⟡ &nbsp; Debate Director</div>
      <div class="message-content"></div>
    `;
  } else {
    // evaluator or unknown
    el.className = 'message-card evaluator';
    el.innerHTML = `
      <div class="evaluator-label">Evaluator — ${msg.speaker_name || ''}</div>
      <div class="message-content"></div>
    `;
  }

  return el;
}

/* ── Typewriter ── */
async function typewrite(el, text, chunkSize = 4, delay = 16) {
  el.textContent = '';
  let i = 0;
  while (i < text.length) {
    el.textContent += text.slice(i, i + chunkSize);
    i += chunkSize;
    if (i % 40 === 0) await sleep(delay);
  }
  // Ensure complete
  el.textContent = text;
}

/* ═══════════════════════════════════════════════════════════
   STAGE MANAGEMENT
═══════════════════════════════════════════════════════════ */
function showDebateScreen(topic, philosophers) {
  document.getElementById('setup-screen').style.display = 'none';
  const screen = document.getElementById('debate-screen');
  screen.classList.add('active');

  document.getElementById('header-topic').textContent = `"${topic}"`;

  // Build philosopher stage
  const stage = document.getElementById('phil-stage');
  stage.innerHTML = '';
  for (const name of philosophers) {
    const color = PHIL_COLORS[name] || '#888';
    const initials = PHIL_INITIALS[name] || name[0];
    const div = document.createElement('div');
    div.className = 'stage-philosopher';
    div.id = `stage-${name}`;
    div.style.setProperty('--color', color);
    div.innerHTML = `
      <div class="stage-avatar">${initials}</div>
      <div class="stage-name">${name}</div>
    `;
    stage.appendChild(div);
  }

  // Clear feed
  document.getElementById('message-feed').innerHTML = '';
  msgQueue = [];
  isTyping = false;
  debateComplete = false;

  // Show spinner
  showStatusOverlay('Summoning the philosophers…');

  window.scrollTo({ top: 0 });
}

function highlightSpeaker(name) {
  document.querySelectorAll('.stage-philosopher').forEach(el => el.classList.remove('speaking'));
  const el = document.getElementById(`stage-${name}`);
  if (el) el.classList.add('speaking');
}

function returnToSetup() {
  document.getElementById('debate-screen').classList.remove('active');
  document.getElementById('setup-screen').style.display = 'flex';
  document.querySelectorAll('.stage-philosopher').forEach(el => el.classList.remove('speaking'));
  // Refresh past debates list
  fetch('/debates').then(r => r.json()).then(d => { if (d.length) renderPastDebates(d); }).catch(() => {});
}

/* ═══════════════════════════════════════════════════════════
   STATUS HELPERS
═══════════════════════════════════════════════════════════ */
function showStatusOverlay(text) {
  const ov = document.getElementById('status-overlay');
  ov.style.display = 'block';
  document.getElementById('status-overlay-text').textContent = text;
}

function hideStatusOverlay() {
  document.getElementById('status-overlay').style.display = 'none';
}

function updateStatusOverlay(text) {
  document.getElementById('status-overlay-text').textContent = text;
}

function setStatusLive(live) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (live ? ' live' : '');
}

function setStatusText(text) {
  document.getElementById('status-text').textContent = text;
}

function onDebateComplete() {
  if (debateComplete) return;
  debateComplete = true;
  setStatusLive(false);
  document.getElementById('status-dot').classList.add('done');
  setStatusText('Complete');

  // Remove active speaker highlight
  document.querySelectorAll('.stage-philosopher').forEach(el => el.classList.remove('speaking'));

  // Append completion message
  const feed = document.getElementById('message-feed');
  const endEl = document.createElement('div');
  endEl.className = 'debate-complete';
  endEl.innerHTML = `
    <div class="complete-ornament">⚖</div>
    <div class="complete-title">The Debate Has Concluded</div>
    <div class="complete-subtitle">The Agora falls silent. Let the ideas resonate.</div>
    <button class="complete-btn" onclick="returnToSetup()">Return to the Agora</button>
  `;
  feed.appendChild(endEl);
  endEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

/* ═══════════════════════════════════════════════════════════
   NOTIFICATIONS
═══════════════════════════════════════════════════════════ */
function showNotif(msg, type = '') {
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = `notif ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

/* ═══════════════════════════════════════════════════════════
   PARTICLE BACKGROUND
═══════════════════════════════════════════════════════════ */
function initParticles() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W = canvas.width = window.innerWidth;
  let H = canvas.height = window.innerHeight;

  window.addEventListener('resize', () => {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  });

  const PARTICLES = 90;
  const particles = Array.from({ length: PARTICLES }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.2 + 0.2,
    vx: (Math.random() - 0.5) * 0.12,
    vy: (Math.random() - 0.5) * 0.12,
    o: Math.random() * 0.5 + 0.1,
    phase: Math.random() * Math.PI * 2,
  }));

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // Subtle radial gradient vignette
    const grd = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
    grd.addColorStop(0, 'rgba(20,10,40,0.0)');
    grd.addColorStop(1, 'rgba(4,4,12,0.7)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;

      const flicker = p.o * (0.6 + 0.4 * Math.sin(t * 0.001 + p.phase));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,146,26,${flicker})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
}

/* ═══════════════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════════════ */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
initParticles();
init();
</script>
</body>
</html>
